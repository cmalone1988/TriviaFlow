<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Backspin">
<title>Backspin Trivia — R&B Classics</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#05060c;
  --ice:#2E9BFF;
  --azure:#1E6BFF;
  --violet:#7C3AED;
  --grape:#6B3FE6;
  --mag:#A78BFA;
  --gold:#FBBF24;
}
* { -webkit-tap-highlight-color: transparent; }
body { font-family:'Outfit',ui-sans-serif,system-ui,sans-serif; touch-action: manipulation; background:#05060c; color:#fff; }
.font-display { font-family:'Anton',sans-serif; letter-spacing:.02em; font-weight:400; }

/* ── COPY PROTECTION ─────────────────────────────────────────── */
.no-select {
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}
.no-context { pointer-events: none; }
/* ─────────────────────────────────────────────────────────────── */

@keyframes pulse-neon {
  0%, 100% { text-shadow: 0 0 10px var(--ice), 0 0 20px var(--azure); }
  50% { text-shadow: 0 0 20px var(--ice), 0 0 40px var(--ice), 0 0 60px var(--azure); }
}
@keyframes slide-up {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes spin-slow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes points-fly {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
}
.neon-text { animation: pulse-neon 2s ease-in-out infinite; }
.slide-up { animation: slide-up 0.6s ease-out forwards; }
.spinner { animation: spin-slow 1s linear infinite; }
.points-fly { animation: points-fly 1s ease-out forwards; }
.logo-glow { box-shadow: 0 0 50px rgba(46,155,255,0.45), 0 0 90px rgba(124,58,237,0.25); }
</style>
</head>

const {
  useState,
  useEffect,
  useCallback,
  useRef

// ── COPY PROTECTION: disable right-click and common keyboard shortcuts ──────
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.ctrlKey && ['c', 'a', 'x', 'u', 's'].includes(e.key.toLowerCase())) e.preventDefault();
  if (e.key === 'F12') e.preventDefault();
});

// ── BRAND CONFIG ────────────────────────────────────────────────────────────
// The QR auto-points players to wherever THIS page is deployed — no edits needed.
// Deploy this file to Vercel and the QR encodes its live URL automatically.
// Only set PLAY_URL_OVERRIDE if players should land on a DIFFERENT address than
// this page (e.g. a custom domain that points here). Otherwise leave it blank.
const PLAY_URL_OVERRIDE = 'https://backspintrivia.com';
const _liveURL = location.protocol === 'http:' || location.protocol === 'https:' ? location.origin + location.pathname : 'https://backspintrivia.app';
