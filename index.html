<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-title" content="Backspin">
<title>Backspin Trivia — R&B Classics</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#05060c;
  --ice:#2E9BFF;
  --azure:#1E6BFF;
  --violet:#7C3AED;
  --grape:#6B3FE6;
  --mag:#A78BFA;
  --gold:#FBBF24;
}
* { -webkit-tap-highlight-color: transparent; }
body { font-family:'Outfit',ui-sans-serif,system-ui,sans-serif; touch-action: manipulation; }
.font-display { font-family:'Anton',sans-serif; letter-spacing:.02em; font-weight:400; }

/* ── COPY PROTECTION ─────────────────────────────────────────── */
.no-select {
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}
.no-context { pointer-events: none; }
/* ─────────────────────────────────────────────────────────────── */

@keyframes pulse-neon {
  0%, 100% { text-shadow: 0 0 10px var(--ice), 0 0 20px var(--azure); }
  50% { text-shadow: 0 0 20px var(--ice), 0 0 40px var(--ice), 0 0 60px var(--azure); }
}
@keyframes slide-up {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes spin-slow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes points-fly {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
}
.neon-text { animation: pulse-neon 2s ease-in-out infinite; }
.slide-up { animation: slide-up 0.6s ease-out forwards; }
.spinner { animation: spin-slow 1s linear infinite; }
.points-fly { animation: points-fly 1s ease-out forwards; }
.logo-glow { box-shadow: 0 0 50px rgba(46,155,255,0.45), 0 0 90px rgba(124,58,237,0.25); }
</style>
</head>

async function getLeaderboard(categoryId) {
  try {
    const filter = categoryId ? `&category=eq.${encodeURIComponent(categoryId)}` : '';
    const res = await fetch(`${SUPABASE_URL}/rest/v1/Leaderboard?order=total_points.desc&limit=10${filter}`, { headers: HEADERS });
    const data = await res.json();
    return Array.isArray(data) ? data : [];
  } catch(e) { return []; }
}

async function saveScore(entry) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/Leaderboard`, {
      method: 'POST',
      headers: { ...HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify(entry)
    });
  } catch(e) { console.error('Save error', e); }
}

      <rect x="24" y="8" width="16" height="28" rx="8"/>
      <line x1="28.5" y1="15" x2="35.5" y2="15"/><line x1="28.5" y1="21" x2="35.5" y2="21"/>

    </g>);

      <path d="M14 38 V32 a18 18 0 0 1 36 0 v6"/>
      <rect x="9" y="36" width="10" height="16" rx="4"/>
      <rect x="45" y="36" width="10" height="16" rx="4"/>
    </g>);
    case 'boombox': return svg(<g {...P}>

function MusicTrivia() {
  const [gameState, setGameState] = useState('landing');
  const [playerName, setPlayerName] = useState('');
  const [selectedCategory, setSelectedCategory] = useState(null);
  const [currentQ, setCurrentQ] = useState(0);
  const [totalPoints, setTotalPoints] = useState(0);
  const [correctCount, setCorrectCount] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showAnswer, setShowAnswer] = useState(false);
  const [timer, setTimer] = useState(MAX_TIME);
  const [questions, setQuestions] = useState([]);
  const [leaderboard, setLeaderboard] = useState([]);
  const [boardLoading, setBoardLoading] = useState(true);
  const [savingScore, setSavingScore] = useState(false);
  const [lastPts, setLastPts] = useState(null);
  const [showPtsPop, setShowPtsPop] = useState(false);
  const [activeLandingTab, setActiveLandingTab] = useState('all');
  const [tabBoards, setTabBoards] = useState({});
  const [tabLoading, setTabLoading] = useState({});
  const timerRef = useRef(MAX_TIME);
  const pointsRef = useRef(0);
  const correctRef = useRef(0);

  const refreshBoard = useCallback(async (catId) => {
    setBoardLoading(true);
    const data = await getLeaderboard(catId);
    setLeaderboard(Array.isArray(data) ? data : []);
    setBoardLoading(false);
  }, []);

  const loadTab = useCallback(async (catId) => {
    if (tabBoards[catId]) return;
    setTabLoading(prev => ({ ...prev, [catId]: true }));
    const data = await getLeaderboard(catId === 'all' ? null : catId);
    setTabBoards(prev => ({ ...prev, [catId]: Array.isArray(data) ? data : [] }));
    setTabLoading(prev => ({ ...prev, [catId]: false }));
  }, [tabBoards]);

  useEffect(() => { loadTab('all'); }, []);

  useEffect(() => {
    if (gameState !== 'playing' || showAnswer) return;
    if (timer <= 0) {
      setShowAnswer(true); setLastPts(0); setShowPtsPop(true);
      setTimeout(() => setShowPtsPop(false), 900);
      return;
    }
    const id = setInterval(() => setTimer(t => { timerRef.current = t - 1; return t - 1; }), 1000);
    return () => clearInterval(id);
  }, [timer, showAnswer, gameState]);

  const handleAnswer = (idx) => {
    if (showAnswer || selected !== null) return;
    const tl = timerRef.current;
    setSelected(idx);
    setShowAnswer(true);
    const correct = idx === questions[currentQ].correctIndex;
    const pts = correct ? calcPoints(tl) : 0;
    if (correct) {
      pointsRef.current += pts;
      correctRef.current += 1;
      setTotalPoints(pointsRef.current);
      setCorrectCount(correctRef.current);
    }
    setLastPts(pts);
    setShowPtsPop(true);
    setTimeout(() => setShowPtsPop(false), 950);
  };

  const nextQ = async () => {
    if (currentQ < questions.length - 1) {
      setCurrentQ(q => q + 1); setSelected(null); setShowAnswer(false);
      setTimer(MAX_TIME); timerRef.current = MAX_TIME; setShowPtsPop(false);
    } else {
      setSavingScore(true);
      await saveScore({
        name: playerName || 'Anonymous',
        total_points: pointsRef.current,
        correct_count: correctRef.current,
        total_questions: questions.length,
        category: selectedCategory
      });
      await refreshBoard(selectedCategory);
      setSavingScore(false);
      setGameState('finished');
    }
  };

  const startGame = () => {
    const cat = categories.find(c => c.id === selectedCategory);
    let pool = cat.years ? triviaQuestions.filter(q => cat.years.includes(q.year)) : triviaQuestions;
    if (!pool.length) pool = triviaQuestions;
    const qs = [...pool].sort(() => Math.random() - 0.5).slice(0, 10).map(q => {
      const opts = [...q.options].sort(() => Math.random() - 0.5);
      return { ...q, options: opts, correctIndex: opts.indexOf(q.answer) };
    });
    setQuestions(qs); setGameState('playing');
    setCurrentQ(0); setTotalPoints(0); setCorrectCount(0);
    pointsRef.current = 0; correctRef.current = 0;
    setSelected(null); setShowAnswer(false);
    setTimer(MAX_TIME); timerRef.current = MAX_TIME;
  };

  const btnClass = (idx) => {
    const base = 'w-full p-4 rounded-xl font-bold text-lg transition-all duration-300 border-2 text-left no-select';
    if (!showAnswer) return `${base} bg-gradient-to-r from-blue-600 to-violet-600 border-blue-400 active:scale-95 text-white`;
    if (idx === questions[currentQ].correctIndex) return `${base} bg-green-600 border-green-400 text-white`;
    if (idx === selected) return `${base} bg-red-600 border-red-400 text-white`;
    return `${base} bg-gray-700 border-gray-600 text-gray-300`;
  };

  const medal = (i) => ['🥇','🥈','🥉'][i] || `#${i+1}`;

  // ── POST-GAME LEADERBOARD ─────────────────────────────────────────────────
  const PostGameBoard = ({ hName, hPts }) => {
    const cat = categories.find(c => c.id === selectedCategory);
    return (
      <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-6 border-2 border-[rgba(251,191,36,0.3)]">
        <div className="flex items-center justify-between mb-4">
          <div>
            <h2 className="text-xl font-black text-[var(--gold)]">🏆 {cat?.name} LEADERBOARD</h2>
            <p className="text-xs text-gray-400 mt-1">Top scores in this category</p>
          </div>
          <button onClick={() => refreshBoard(selectedCategory)} className="text-xs text-[var(--ice)] underline">↻ Refresh</button>
        </div>
        {boardLoading ? (
          <div className="text-center py-6"><div className="text-4xl spinner inline-block">⏳</div><p className="text-gray-400 mt-2">Loading...</p></div>
        ) : leaderboard.length === 0 ? (
          <p className="text-gray-400 text-center py-4">No scores yet in this category!</p>
        ) : leaderboard.slice(0, 10).map((e, i) => {
          const me = hName && e.name === hName && e.total_points === hPts;
          return (
            <div key={i} className={`flex items-center justify-between p-3 rounded-xl mb-2 ${me ? 'bg-[rgba(251,191,36,0.18)] border-2 border-[var(--gold)]' : 'bg-gray-800/50'}`}>
              <div className="flex items-center gap-3">
                <span className={`text-lg font-black w-8 ${i===0?'text-[var(--gold)]':i===1?'text-gray-300':i===2?'text-orange-400':'text-gray-500'}`}>{medal(i)}</span>
                <div>
                  <div className="text-white font-bold text-sm no-select">{e.name}{me?' YOU':''}</div>
                  <div className="text-xs text-gray-400 no-select">{e.correct_count}/{e.total_questions} correct</div>
                </div>
              </div>
              <div className="text-right">
                <div className="text-lg font-black text-[var(--ice)] no-select">{e.total_points?.toLocaleString()}</div>
                <div className="text-xs text-gray-500">pts</div>
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  // ── LANDING LEADERBOARD TABS ──────────────────────────────────────────────
  const LandingBoard = () => {
    const tabList = [
      { id: 'all', label: 'ALL' },
      { id: '1990-1994', label: '90-94' },
      { id: '1995-1999', label: '95-99' },
      { id: '2000-2004', label: '00-04' },
      { id: '2005-2010', label: '05-10' },
      { id: 'late-90s', label: 'LATE 90s' },
      { id: '2000s', label: '2000s' },
      { id: 'random', label: 'RANDOM' },
    ];
    const handleTab = (id) => { setActiveLandingTab(id); loadTab(id); };
    const currentData = tabBoards[activeLandingTab] || [];
    const isLoading = tabLoading[activeLandingTab];
    return (
      <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-6 border-2 border-[rgba(251,191,36,0.3)]">
        <h2 className="text-2xl font-black text-[var(--gold)] mb-4">🏆 LEADERBOARDS</h2>
        <div className="flex flex-wrap gap-2 mb-5">
          {tabList.map(tab => (
            <button key={tab.id} onClick={() => handleTab(tab.id)}
              className={`px-3 py-1.5 rounded-xl text-xs font-black transition-all ${activeLandingTab === tab.id ? 'bg-[var(--gold)] text-black' : 'bg-gray-800 text-gray-300 hover:bg-gray-700'}`}>
              {tab.label}
            </button>
          ))}
        </div>
        {isLoading ? (
          <div className="text-center py-6"><div className="text-3xl spinner inline-block">⏳</div><p className="text-gray-400 mt-2">Loading...</p></div>
        ) : currentData.length === 0 ? (
          <p className="text-gray-400 text-center py-4">No scores yet — be the first! 🎧</p>
        ) : currentData.slice(0, 10).map((e, i) => (
          <div key={i} className="flex items-center justify-between p-3 rounded-xl mb-2 bg-gray-800/50">
            <div className="flex items-center gap-3">
              <span className={`text-lg font-black w-8 ${i===0?'text-[var(--gold)]':i===1?'text-gray-300':i===2?'text-orange-400':'text-gray-500'}`}>{medal(i)}</span>
              <div>
                <div className="text-white font-bold text-sm no-select">{e.name}</div>
                <div className="text-xs text-gray-400 no-select">{e.correct_count}/{e.total_questions} correct</div>
              </div>
            </div>
            <div className="text-right">
              <div className="text-lg font-black text-[var(--ice)] no-select">{e.total_points?.toLocaleString()}</div>
              <div className="text-xs text-gray-500">pts</div>
            </div>
          </div>
        ))}
      </div>
    );
  };

  // ── LANDING ───────────────────────────────────────────────────────────────
  if (gameState === 'landing') {
    const qr = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(GAME_URL)}`;
    return (
      <div className="min-h-screen bg-gradient-to-br from-[#0a0b16] via-[#15103a] to-black p-6 flex items-center justify-center">
        <div className="max-w-2xl w-full space-y-6">
          <div className="text-center slide-up">
            <img src={LOGO} alt="DJ CBLAK" className="w-32 h-32 mx-auto rounded-2xl logo-glow mb-5 no-select" />
            <h1 className="font-display text-7xl md:text-8xl mb-1 no-select" style={{background:'linear-gradient(135deg,#5BC0FF,#2E9BFF,#8B5CF6)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>BACKSPIN</h1>
            <p className="text-[var(--ice)] text-3xl neon-text font-display tracking-[0.35em] mb-2 no-select">TRIVIA</p>
            <p className="text-[var(--mag)] text-xl uppercase tracking-widest mb-1 no-select">R&B Classics · 1990–2010</p>
            <p className="text-gray-400 no-select">Speed Scoring · Category Leaderboards · Max 17,500 pts</p>
            <p className="text-gray-600 text-xs mt-2 uppercase tracking-[0.25em] no-select">Spun by DJ CBLAK</p>
          </div>
          <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-5 border-2 border-blue-400/30">
            <h3 className="text-base font-black text-[var(--mag)] mb-3 uppercase tracking-wider no-select">⚡ Speed Scoring — Answer Fast, Score More</h3>
            <div className="grid grid-cols-3 gap-3 text-center">
              <div className="bg-gray-800/60 rounded-xl p-3"><div className="text-[var(--gold)] font-black text-xl no-select">1,750</div><div className="text-gray-400 text-xs mt-1 no-select">Answer in 1s</div></div>
              <div className="bg-gray-800/60 rounded-xl p-3"><div className="text-[var(--ice)] font-black text-xl no-select">1,400</div><div className="text-gray-400 text-xs mt-1 no-select">Answer in 7s</div></div>
              <div className="bg-gray-800/60 rounded-xl p-3"><div className="text-[var(--mag)] font-black text-xl no-select">1,050</div><div className="text-gray-400 text-xs mt-1 no-select">Answer in 14s</div></div>
            </div>
            <p className="text-gray-500 text-xs text-center mt-3 no-select">Wrong answer or timeout = 0 pts</p>
          </div>
          <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-8 border-2 border-violet-400/30 text-center">
            <h2 className="text-2xl font-bold text-white mb-4 no-select">📱 Scan to Play</h2>
            <div className="bg-white p-4 rounded-2xl inline-block" style={{boxShadow:'0 0 40px rgba(46,155,255,0.4)'}}>
              <img src={qr} alt="Scan to play" className="w-48 h-48" loading="lazy" />
            </div>
            <p className="text-[var(--ice)] text-sm uppercase tracking-wider mt-3 no-select">{GAME_HOST}</p>
          </div>
          <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-8 border-2 border-blue-400/30">
            <h2 className="text-2xl font-bold text-white mb-6 no-select">Enter Your Name</h2>
            <input type="text" value={playerName} onChange={e => setPlayerName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && playerName.trim() && setGameState('category')}
              onPaste={e => e.preventDefault()}
              placeholder="Your name..." maxLength={20}
              className="w-full px-6 py-4 rounded-xl bg-gray-800 border-2 border-blue-500 text-white text-xl focus:outline-none focus:border-[var(--mag)] mb-4" />
            <button onClick={() => { if (playerName.trim()) setGameState('category'); }} disabled={!playerName.trim()}
              className="w-full bg-gradient-to-r from-[var(--ice)] to-[var(--violet)] text-white font-black text-2xl py-5 rounded-xl hover:scale-105 transition shadow-2xl disabled:opacity-50 disabled:cursor-not-allowed no-select">
              START PLAYING 🎧
            </button>
          </div>
          <LandingBoard />
        </div>
      </div>
    );
  }

  // ── CATEGORY ──────────────────────────────────────────────────────────────
  if (gameState === 'category') return (
    <div className="min-h-screen bg-gradient-to-br from-[#0a0b16] via-black to-[#10122a] p-6">
      <div className="max-w-2xl mx-auto">
        <div className="text-center mb-8 mt-6">
          <BrandMark size="h-8" />
          <h1 className="font-display text-5xl mt-6 mb-2 no-select" style={{background:'linear-gradient(90deg,#5BC0FF,#8B5CF6)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>HEY {playerName}!</h1>
          <p className="text-[var(--ice)] text-xl neon-text uppercase tracking-widest no-select">Select An Era</p>
        </div>
        <div className="grid grid-cols-2 gap-4 mb-6">
          {categories.map(cat => (
            <button key={cat.id} onClick={() => { setSelectedCategory(cat.id); setGameState('start'); }}
              className={`bg-gradient-to-br ${cat.color} p-6 rounded-2xl border-2 border-blue-400/30 hover:border-[var(--mag)] hover:scale-105 transition-all duration-300 shadow-lg no-select flex flex-col items-center`}>
              <div className="mb-3"><CategoryArt art={cat.art} /></div>
              <div className="text-white font-black text-lg tracking-wider">{cat.name}</div>
            </button>
          ))}
        </div>
        <button onClick={() => { setGameState('landing'); setPlayerName(''); }} className="w-full bg-gray-800 text-white font-bold py-3 rounded-xl hover:bg-gray-700 transition no-select">Back to Home</button>
      </div>
    </div>
  );

  // ── START ─────────────────────────────────────────────────────────────────
  if (gameState === 'start') {
    const cat = categories.find(c => c.id === selectedCategory);
    return (
      <div className={`min-h-screen bg-gradient-to-br ${cat.color} flex items-center justify-center p-4`}>
        <div className="max-w-md w-full text-center space-y-6">
          <div className="inline-block bg-black/25 rounded-3xl p-6"><CategoryArt art={cat.art} /></div>
          <h1 className="font-display text-5xl text-white no-select">{cat.name}</h1>
          <div className="bg-black/30 backdrop-blur-sm rounded-2xl p-6 space-y-2">
            <div className="text-white text-lg no-select">10 Questions</div>
            <div className="text-white text-lg no-select">15 Seconds Each</div>
            <div className="text-white text-lg no-select">Max 17,500 Points</div>
            <div className="text-[var(--gold)] text-sm mt-2 no-select">Faster = More Points!</div>
          </div>
          <button onClick={startGame} className="w-full bg-gradient-to-r from-[var(--gold)] to-orange-500 text-black font-black text-xl py-4 rounded-full hover:scale-105 transition shadow-2xl no-select">DROP THE NEEDLE</button>
          <button onClick={() => { setGameState('category'); setSelectedCategory(null); }} className="w-full bg-black/30 text-white font-bold text-lg py-3 rounded-full hover:bg-black/40 transition no-select">Back to Eras</button>
        </div>
      </div>
    );
  }

  // ── FINISHED ──────────────────────────────────────────────────────────────
  if (gameState === 'finished') {
    const rank = leaderboard.findIndex(e => e.name === playerName && e.total_points === totalPoints) + 1;
    const pct = Math.round((correctCount / questions.length) * 100);
    const tier = pct>=80?"🎧 HEADLINER!":pct>=60?"ON THE ONES & TWOS!":pct>=40?"WARMING UP THE CROWD":"SOUND CHECK";
    return (
      <div className="min-h-screen bg-gradient-to-br from-[#0a0b16] via-[#15103a] to-black p-4 overflow-y-auto">
        <div className="max-w-2xl mx-auto py-6 space-y-6">
          <div className="text-center space-y-4">
            <BrandMark size="h-8" />
            <div className="text-8xl no-select pt-2">🏆</div>
            <h1 className="font-display text-5xl text-white no-select">THAT'S A WRAP!</h1>
            <div className="bg-black/30 backdrop-blur-sm rounded-2xl p-8 space-y-3">
              <div className="text-2xl text-gray-300 no-select">Hey {playerName}!</div>
              <div className="text-6xl font-black text-[var(--gold)] no-select">{totalPoints.toLocaleString()}</div>
              <div className="text-xl text-[var(--ice)] font-bold uppercase tracking-wider no-select">Points</div>
              <div className="text-lg text-white no-select">{correctCount}/{questions.length} correct · {pct}%</div>
              {rank > 0 && rank <= 10 && <div className="text-xl text-green-400 no-select">You are #{rank} in this category!</div>}
              <div className="text-2xl text-[var(--mag)] font-display no-select">{tier}</div>
            </div>
          </div>
          {savingScore ? (
            <div className="text-center py-4"><div className="text-3xl spinner inline-block">💾</div><p className="text-[var(--ice)] mt-2">Saving score...</p></div>
          ) : <PostGameBoard hName={playerName} hPts={totalPoints} />}
          <button onClick={startGame} className="w-full bg-gradient-to-r from-[var(--ice)] to-[var(--violet)] text-white font-black text-xl py-4 rounded-full hover:scale-105 transition shadow-2xl no-select">PLAY AGAIN</button>
          <button onClick={() => { setGameState('category'); setSelectedCategory(null); }} className="w-full bg-gray-700 text-white font-bold text-lg py-3 rounded-full hover:bg-gray-600 transition no-select">Choose Different Era</button>
          <button onClick={() => { setGameState('landing'); setPlayerName(''); setSelectedCategory(null); }} className="w-full bg-gray-800 text-white font-bold py-3 rounded-full hover:bg-gray-700 transition no-select">Back to Home</button>
        </div>
      </div>
    );
  }

  // ── PLAYING ───────────────────────────────────────────────────────────────
  const q = questions[currentQ];
  const potential = calcPoints(timer);

  return (
    <div className="min-h-screen bg-gradient-to-br from-[#0a0b16] via-[#15103a] to-black p-4">
      <div className="max-w-2xl mx-auto py-4 space-y-4">
        <div className="pb-1"><BrandMark size="h-7" /></div>
        <div className="flex justify-between items-center gap-2">
          <div className="bg-black/40 backdrop-blur-sm px-4 py-2 rounded-xl text-center flex-1">
            <div className="text-xs text-gray-400 no-select">QUESTION</div>
            <div className="text-lg font-bold text-white no-select">{currentQ+1}/{questions.length}</div>
          </div>
          <div className="bg-black/40 backdrop-blur-sm px-4 py-2 rounded-xl text-center flex-1">
            <div className="text-xs text-gray-400 no-select">SCORE</div>
            <div className="text-lg font-black text-[var(--gold)] no-select">{totalPoints.toLocaleString()}</div>
          </div>
          <div className="bg-black/40 backdrop-blur-sm px-4 py-2 rounded-xl text-center flex-1">
            <div className="text-xs text-gray-400 no-select">CORRECT</div>
            <div className="text-lg font-black text-green-400 no-select">{correctCount}</div>
          </div>
        </div>
        <div className="bg-black/40 backdrop-blur-sm rounded-xl p-4">
          <div className="flex items-center justify-between mb-2">
            <span className="text-white font-bold no-select">Time Left</span>
            <div className="flex items-center gap-3">
              {!showAnswer && <span className="text-sm font-bold text-[var(--gold)] no-select">+{potential.toLocaleString()} pts</span>}
              <span className={`text-2xl font-black no-select ${timer<=5?'text-red-400 animate-pulse':timer<=10?'text-orange-400':'text-[var(--gold)]'}`}>{timer}s</span>
            </div>
          </div>
          <div className="h-4 bg-gray-700 rounded-full overflow-hidden">
            <div className={`h-full transition-all duration-1000 rounded-full ${timer<=5?'bg-red-500':timer<=10?'bg-orange-400':'bg-[var(--ice)]'}`} style={{width:`${(timer/MAX_TIME)*100}%`}}/>
          </div>
        </div>

        {/* QUESTION — fully copy protected */}
        <div className="bg-black/50 backdrop-blur-sm rounded-2xl p-6 shadow-2xl relative overflow-hidden"
          onCopy={e => e.preventDefault()}
          onCut={e => e.preventDefault()}>
          <div className="text-xs text-[var(--ice)] uppercase tracking-wider mb-2 no-select">{q.year} · R&B</div>
          <h2 className="text-2xl md:text-3xl font-black text-white text-center leading-tight no-select"
            onCopy={e => e.preventDefault()}
            onCut={e => e.preventDefault()}>
            {q.question}
          </h2>
          {showPtsPop && (
            <div className={`absolute top-3 right-4 text-2xl font-black points-fly no-select ${lastPts>0?'text-[var(--gold)]':'text-red-400'}`}>
              {lastPts>0?`+${lastPts.toLocaleString()}`:'MISS!'}
            </div>
          )}
        </div>

        {/* ANSWER BUTTONS — no-select + copy blocked */}
        <div className="space-y-3">
          {q.options.map((opt, i) => (
            <button key={i} onClick={() => handleAnswer(i)} disabled={showAnswer}
              onCopy={e => e.preventDefault()}
              className={btnClass(i)}>
              <span className="mr-2 opacity-60 text-sm">{String.fromCharCode(65+i)}.</span>{opt}
            </button>
          ))}
        </div>

        {showAnswer && (
          <button onClick={nextQ} className="w-full bg-gradient-to-r from-[var(--ice)] to-[var(--violet)] text-white font-black text-xl py-4 rounded-full hover:scale-105 transition shadow-2xl no-select">
            {currentQ < questions.length-1 ? 'NEXT QUESTION' : 'SEE RESULTS'}
          </button>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<MusicTrivia />, document.getElementById('root'));
</script>
</body>
</html>
