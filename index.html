<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriviaFlow - 90s/00s R&B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700&family=Orbitron:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; scroll-behavior: smooth; }
        .font-retro { font-family: 'Orbitron', sans-serif; }
        .neon-grid {
            background-image: linear-gradient(0deg, transparent 24%, rgba(0, 255, 255, .05) 25%, rgba(0, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, .05) 75%, rgba(0, 255, 255, .05) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, .05) 25%, rgba(0, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, .05) 75%, rgba(0, 255, 255, .05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-neon { background: linear-gradient(45deg, #ff00cc, #3333ff); box-shadow: 0 0 20px rgba(255, 0, 204, 0.4); }
    </style>
</head>
<body class="neon-grid">

    <section id="hero" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="font-retro text-5xl md:text-7xl mb-4 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500">TRIVIAFLOW</h1>
        <div class="glass p-8 rounded-3xl max-w-sm w-full mb-8">
            <div id="qrcode" class="flex justify-center p-3 bg-white rounded-xl mb-4 mx-auto w-48 h-48"></div>
            <p class="text-[10px] text-cyan-400 uppercase tracking-widest mb-6">Scan to Play at the Lounge</p>
            <button onclick="document.getElementById('game-section').scrollIntoView()" class="btn-neon w-full py-4 rounded-full font-black uppercase tracking-tighter">Enter The Archive</button>
        </div>
    </section>

    <section id="game-section" class="min-h-screen p-6">
        <div id="game-container" class="max-w-4xl mx-auto">
            <h2 class="text-center text-3xl font-bold text-pink-500 mb-8 uppercase">Select An Era</h2>
            <div id="category-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                </div>
        </div>
    </section>

    <script>
        // Your existing trivia questions
        const questions = [
            { year: 1995, artist: "TLC", album: "CrazySexyCool", question: "Which group released 'Waterfalls' in 1995?", options: ["TLC", "SWV", "Xscape", "En Vogue"], correct: 0 },
            { year: 1998, artist: "Lauryn Hill", album: "Miseducation", question: "How many Grammys did Lauryn Hill win for this album?", options: ["3", "5", "8", "10"], correct: 1 },
            { year: 2004, artist: "Usher", album: "Confessions", question: "Which track stayed #1 for 12 weeks?", options: ["Burn", "Caught Up", "Yeah!", "My Boo"], correct: 2 }
        ];

        // Generate QR Code
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 180,
            height: 180
        });

        // Generate Category Buttons
        const grid = document.getElementById('category-grid');
        [1995, 1998, 2004].forEach(year => {
            const btn = document.createElement('button');
            btn.className = "glass p-8 rounded-2xl text-2xl font-bold hover:bg-pink-500 transition-all";
            btn.innerText = year;
            btn.onclick = () => alert("Starting " + year + " Trivia!");
            grid.appendChild(btn);
        });
    </script>
</body>
</html>
