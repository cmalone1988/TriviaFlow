// ─── SHARED LEADERBOARD API ─────────────────────────────────────────────────
// Uses Claude artifact persistent storage — shared across ALL users/devices
const LEADERBOARD_KEY = 'triviaflow_leaderboard_v1';

async function getSharedLeaderboard() {
  try {
    const result = await window.storage.get(LEADERBOARD_KEY, true); // shared=true
    if (result && result.value) {
      return JSON.parse(result.value);
    }
    return [];
  } catch (e) {
    return [];
  }
}

async function saveSharedScore(entry) {
  try {
    // Read current board
    let board = await getSharedLeaderboard();
    board.push(entry);
    // Sort by percentage desc, keep top 20
    board = board.sort((a, b) => b.percentage - a.percentage || b.score - a.score).slice(0, 20);
    await window.storage.set(LEADERBOARD_KEY, JSON.stringify(board), true); // shared=true
    return board;
  } catch (e) {
    return [];
  }
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function MusicTrivia() {
  const [gameState, setGameState] = useState('landing');
  const [playerName, setPlayerName] = useState('');
  const [selectedCategory, setSelectedCategory] = useState(null);
  const [currentQ, setCurrentQ] = useState(0);
  const [score, setScore] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showAnswer, setShowAnswer] = useState(false);
  const [timer, setTimer] = useState(15);
  const [questions, setQuestions] = useState([]);
  const [leaderboard, setLeaderboard] = useState([]);
  const [boardLoading, setBoardLoading] = useState(true);
  const [savingScore, setSavingScore] = useState(false);

  // Load shared leaderboard on mount and when returning to landing
  const refreshLeaderboard = useCallback(async () => {
    setBoardLoading(true);
    const board = await getSharedLeaderboard();
    setLeaderboard(board);
    setBoardLoading(false);
  }, []);

  useEffect(() => {
    refreshLeaderboard();
  }, []);

  useEffect(() => {
    if (gameState === 'landing') refreshLeaderboard();
  }, [gameState]);

  // Timer
  useEffect(() => {
    if (gameState === 'playing' && !showAnswer && timer > 0) {
      const interval = setInterval(() => setTimer(t => t - 1), 1000);
      return () => clearInterval(interval);
    }
    if (timer === 0 && !showAnswer) setShowAnswer(true);
  }, [timer, showAnswer, gameState]);

  const saveScore = async (finalScore) => {
    setSavingScore(true);
    const newEntry = {
      name: playerName || 'Anonymous',
      score: finalScore,
      total: questions.length,
      percentage: Math.round((finalScore / questions.length) * 100),
      category: selectedCategory,
      date: new Date().toISOString()
    };
    const updated = await saveSharedScore(newEntry);
    setLeaderboard(updated);
    setSavingScore(false);
  };

  const startFromLanding = (name) => {
    setPlayerName(name);
    setGameState('category');
  };

  const selectCategory = (categoryId) => {
    setSelectedCategory(categoryId);
    setGameState('start');
  };

  const startGame = () => {
    const cat = categories.find(c => c.id === selectedCategory);
    let filtered;
    if (cat.years) {
      filtered = triviaQuestions.filter(q => cat.years.includes(q.year));
    } else {
      filtered = triviaQuestions;
    }
    if (filtered.length === 0) filtered = triviaQuestions;
    const shuffled = [...filtered].sort(() => Math.random() - 0.5).slice(0, 10);
    const questionsWithShuffledAnswers = shuffled.map(q => {
      const correctAnswer = q.answer;
      const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
      const newCorrectIndex = shuffledOptions.indexOf(correctAnswer);
      return { ...q, options: shuffledOptions, correctIndex: newCorrectIndex, correctAnswer };
    });
    setQuestions(questionsWithShuffledAnswers);
    setGameState('playing');
    setCurrentQ(0);
    setScore(0);
    setSelected(null);
    setShowAnswer(false);
    setTimer(15);
  };

  const selectAnswer = (idx) => {
    if (showAnswer || selected !== null) return;
    setSelected(idx);
    setShowAnswer(true);
    if (idx === questions[currentQ].correctIndex) setScore(s => s + 1);
  };

  const nextQuestion = async () => {
    if (currentQ < questions.length - 1) {
      setCurrentQ(currentQ + 1);
      setSelected(null);
      setShowAnswer(false);
      setTimer(15);
    } else {
      const finalScore = selected !== null && selected === questions[currentQ].correctIndex
        ? score + 1 : score;
      await saveScore(finalScore);
      setGameState('finished');
    }
  };

  const backToCategories = () => {
    setGameState('category');
    setSelectedCategory(null);
  };

  const backToLanding = () => {
    setGameState('landing');
    setPlayerName('');
    setSelectedCategory(null);
  };

  const getButtonClass = (idx) => {
    const base = 'w-full p-4 rounded-xl font-bold text-lg transition-all duration-300 border-2 text-left';
    if (!showAnswer) return `${base} bg-gradient-to-r from-purple-600 to-pink-600 border-purple-400 active:scale-95 text-white`;
    const correctIdx = questions[currentQ].correctIndex;
    if (idx === correctIdx) return `${base} bg-green-600 border-green-400 text-white`;
    if (idx === selected && idx !== correctIdx) return `${base} bg-red-600 border-red-400 text-white`;
    return `${base} bg-gray-700 border-gray-600 text-gray-300`;
  };

  const medalEmoji = (idx) => ['🥇', '🥈', '🥉'][idx] || `#${idx + 1}`;

  // ── LEADERBOARD PANEL (reusable) ──────────────────────────────────────────
  const LeaderboardPanel = ({ highlightName, highlightPct, title = '🏆 GLOBAL LEADERBOARD', limit = 10 }) => (
    <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-6 border-2 border-yellow-400/30">
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-2xl font-black text-yellow-400">{title}</h2>
        <button onClick={refreshLeaderboard} className="text-xs text-cyan-400 underline">↻ Refresh</button>
      </div>
      {boardLoading ? (
        <div className="text-center py-6">
          <div className="text-4xl spinner inline-block">⏳</div>
          <p className="text-gray-400 mt-2">Loading scores...</p>
        </div>
      ) : leaderboard.length === 0 ? (
        <p className="text-gray-400 text-center py-4">No scores yet — be the first!</p>
      ) : (
        <div className="space-y-2">
          {leaderboard.slice(0, limit).map((entry, idx) => {
            const isMe = highlightName && entry.name === highlightName && entry.percentage === highlightPct;
            return (
              <div key={idx} className={`flex items-center justify-between p-3 rounded-xl ${isMe ? 'bg-yellow-400/20 border-2 border-yellow-400' : 'bg-gray-800/50'}`}>
                <div className="flex items-center gap-3">
                  <span className={`text-lg font-black w-8 ${idx === 0 ? 'text-yellow-400' : idx === 1 ? 'text-gray-300' : idx === 2 ? 'text-orange-400' : 'text-gray-500'}`}>
                    {medalEmoji(idx)}
                  </span>
                  <div>
                    <div className="text-white font-bold text-sm">{entry.name} {isMe ? '← YOU' : ''}</div>
                    <div className="text-xs text-gray-400">{entry.score}/{entry.total} correct · {entry.category || 'all'}</div>
                  </div>
                </div>
                <div className="text-xl font-black text-cyan-400">{entry.percentage}%</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  // ── LANDING ───────────────────────────────────────────────────────────────
  if (gameState === 'landing') {
    const qrCodeURL = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent('https://trivia-flow-sigma.vercel.app/')}`;
    return (
      <div className="min-h-screen bg-gradient-to-br from-gray-900 via-purple-900 to-black p-6 flex items-center justify-center">
        <div className="max-w-2xl w-full space-y-6">
          <div className="text-center slide-up">
            <h1 className="text-7xl md:text-8xl font-black mb-2" style={{
              background: 'linear-gradient(135deg, #00F0FF, #FF10F0, #FFFF00)',
              WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
            }}>R&B TRIVIA</h1>
            <p className="text-cyan-400 text-2xl neon-text uppercase tracking-widest mb-1">1990–2010 Classics</p>
            <p className="text-gray-400 text-lg">100+ Questions • 8 Eras • Shared Leaderboard</p>
          </div>

          <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-8 border-2 border-pink-400/30 slide-up text-center" style={{animationDelay:'0.1s'}}>
            <h2 className="text-2xl font-bold text-white mb-4">📱 Share with Friends</h2>
            <div className="bg-white p-4 rounded-2xl inline-block shadow-2xl" style={{boxShadow:'0 0 40px rgba(0,240,255,0.4)'}}>
              <img src={qrCodeURL} alt="Scan to play" className="w-48 h-48" loading="lazy" />
            </div>
            <p className="text-cyan-400 text-sm uppercase tracking-wider mt-3">Scan to Play</p>
          </div>

          <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-8 border-2 border-cyan-400/30 slide-up" style={{animationDelay:'0.2s'}}>
            <h2 className="text-2xl font-bold text-white mb-6">Enter Your Name</h2>
            <input
              type="text"
              value={playerName}
              onChange={(e) => setPlayerName(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && playerName.trim() && startFromLanding(playerName)}
              placeholder="Your name..."
              className="w-full px-6 py-4 rounded-xl bg-gray-800 border-2 border-purple-500 text-white text-xl focus:outline-none focus:border-cyan-400 mb-4"
              maxLength={20}
            />
            <button
              onClick={() => startFromLanding(playerName)}
              disabled={!playerName.trim()}
              className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-2xl py-5 rounded-xl hover:scale-105 transition shadow-2xl disabled:opacity-50 disabled:cursor-not-allowed"
            >
              START PLAYING 🎵
            </button>
          </div>

          <div className="slide-up" style={{animationDelay:'0.4s'}}>
            <LeaderboardPanel />
          </div>
        </div>
      </div>
    );
  }

  // ── CATEGORY ──────────────────────────────────────────────────────────────
  if (gameState === 'category') {
    return (
      <div className="min-h-screen bg-gradient-to-br from-gray-900 via-black to-gray-900 p-6">
        <div className="max-w-2xl mx-auto">
          <div className="text-center mb-10 mt-8">
            <h1 className="text-5xl font-black mb-3" style={{
              background: 'linear-gradient(90deg, #00F0FF, #FF10F0)',
              WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
            }}>HEY {playerName}! 👋</h1>
            <p className="text-cyan-400 text-xl neon-text uppercase tracking-widest">Select An Era</p>
          </div>
          <div className="grid grid-cols-2 gap-4 mb-6">
            {categories.map(cat => (
              <button key={cat.id} onClick={() => selectCategory(cat.id)}
                className={`bg-gradient-to-br ${cat.color} p-6 rounded-2xl border-2 border-cyan-400/30 hover:border-cyan-400 hover:scale-105 transition-all duration-300 shadow-lg`}>
                <div className="text-5xl mb-3">{cat.emoji}</div>
                <div className="text-white font-black text-lg tracking-wider">{cat.name}</div>
              </button>
            ))}
          </div>
          <button onClick={backToLanding} className="w-full bg-gray-800 text-white font-bold py-3 rounded-xl hover:bg-gray-700 transition">← Back to Home</button>
        </div>
      </div>
    );
  }

  // ── START SCREEN ──────────────────────────────────────────────────────────
  if (gameState === 'start') {
    const selectedCat = categories.find(c => c.id === selectedCategory);
    return (
      <div className="min-h-screen bg-gradient-to-br from-purple-900 via-pink-900 to-red-900 flex items-center justify-center p-4">
        <div className="max-w-md w-full text-center space-y-6">
          <div className="text-8xl">{selectedCat.emoji}</div>
          <h1 className="text-5xl font-black text-white">{selectedCat.name}</h1>
          <div className="bg-black/30 backdrop-blur-sm rounded-2xl p-6 space-y-3">
            <div className="flex items-center justify-center gap-2 text-white text-lg">⚡ 10 Questions</div>
            <div className="flex items-center justify-center gap-2 text-white text-lg">⏱️ 15 Seconds Each</div>
            <div className="flex items-center justify-center gap-2 text-white text-lg">🌍 Shared Leaderboard</div>
          </div>
          <button onClick={startGame} className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-xl py-4 rounded-full hover:scale-105 transition shadow-2xl">
            START GAME
          </button>
          <button onClick={backToCategories} className="w-full bg-gray-700 text-white font-bold text-lg py-3 rounded-full hover:bg-gray-600 transition">← Back to Eras</button>
        </div>
      </div>
    );
  }

  // ── FINISHED ──────────────────────────────────────────────────────────────
  if (gameState === 'finished') {
    const finalScore = score;
    const percentage = Math.round((finalScore / questions.length) * 100);
    const rank = leaderboard.findIndex(e => e.name === playerName && e.percentage === percentage) + 1;

    return (
      <div className="min-h-screen bg-gradient-to-br from-purple-900 via-pink-900 to-red-900 p-4 overflow-y-auto">
        <div className="max-w-2xl mx-auto py-6 space-y-6">
          <div className="text-center space-y-4">
            <div className="text-8xl">🏆</div>
            <h1 className="text-5xl font-black text-white">FINISHED!</h1>
            <div className="bg-black/30 backdrop-blur-sm rounded-2xl p-8 space-y-3">
              <div className="text-2xl text-gray-300">Hey {playerName}!</div>
              <div className="text-7xl font-black text-yellow-400">{finalScore}/{questions.length}</div>
              <div className="text-3xl font-bold text-white">{percentage}%</div>
              {rank > 0 && rank <= 20 && (
                <div className="text-xl text-cyan-400">🎉 You're #{rank} on the global leaderboard!</div>
              )}
              <div className="text-2xl text-pink-300">
                {percentage >= 80 ? "🎤 R&B LEGEND!" : percentage >= 60 ? "💿 Soul Music Fan!" : percentage >= 40 ? "🎵 Getting There!" : "📻 Keep Listening!"}
              </div>
            </div>
          </div>

          {savingScore ? (
            <div className="text-center py-4">
              <div className="text-3xl spinner inline-block">💾</div>
              <p className="text-cyan-400 mt-2">Saving your score...</p>
            </div>
          ) : (
            <LeaderboardPanel highlightName={playerName} highlightPct={percentage} />
          )}

          <button onClick={startGame} className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-xl py-4 rounded-full hover:scale-105 transition shadow-2xl">
            PLAY AGAIN
          </button>
          <button onClick={backToCategories} className="w-full bg-gray-700 text-white font-bold text-lg py-3 rounded-full hover:bg-gray-600 transition">← Choose Different Era</button>
          <button onClick={backToLanding} className="w-full bg-gray-800 text-white font-bold py-3 rounded-full hover:bg-gray-700 transition">🏠 Back to Home</button>
        </div>
      </div>
    );
  }

  // ── PLAYING ───────────────────────────────────────────────────────────────
  const question = questions[currentQ];
  return (
    <div className="min-h-screen bg-gradient-to-br from-purple-900 via-pink-900 to-red-900 p-4">
      <div className="max-w-2xl mx-auto py-6 space-y-6">
        <div className="flex justify-between items-center">
          <div className="bg-black/40 backdrop-blur-sm px-4 py-2 rounded-xl">
            <div className="text-lg font-bold text-white">Q {currentQ + 1}/{questions.length}</div>
          </div>
          <div className="bg-black/40 backdrop-blur-sm px-4 py-2 rounded-xl">
            <div className="text-sm text-cyan-400">{question.year}</div>
          </div>
          <div className="bg-black/40 backdrop-blur-sm px-4 py-2 rounded-xl">
            <div className="text-lg font-bold text-yellow-400">Score: {score}</div>
          </div>
        </div>

        <div className="bg-black/40 backdrop-blur-sm rounded-xl p-4">
          <div className="flex items-center justify-between mb-2">
            <span className="text-white font-bold">⏱️ Time Left</span>
            <span className={`text-2xl font-black ${timer <= 5 ? 'text-red-400 animate-pulse' : 'text-yellow-400'}`}>{timer}s</span>
          </div>
          <div className="h-3 bg-gray-700 rounded-full overflow-hidden">
            <div className={`h-full transition-all duration-1000 ${timer <= 5 ? 'bg-red-500' : 'bg-yellow-400'}`} style={{width:`${(timer/15)*100}%`}}/>
          </div>
        </div>

        <div className="bg-black/50 backdrop-blur-sm rounded-2xl p-6 shadow-2xl">
          <h2 className="text-2xl md:text-3xl font-black text-white text-center leading-tight">{question.question}</h2>
        </div>

        <div className="space-y-3">
          {question.options.map((option, idx) => (
            <button key={idx} onClick={() => selectAnswer(idx)} disabled={showAnswer} className={getButtonClass(idx)}>
              <span className="mr-2 text-sm opacity-60">{String.fromCharCode(65+idx)}.</span>{option}
            </button>
          ))}
        </div>

        {showAnswer && (
          <button onClick={nextQuestion} className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-xl py-4 rounded-full hover:scale-105 transition shadow-2xl">
            {currentQ < questions.length - 1 ? 'NEXT QUESTION →' : 'SEE RESULTS'}
          </button>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<MusicTrivia />, document.getElementById('root'));
</script>
</body>
</html>
