<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriviaFlow: The R&B Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; }
        .font-title { font-family: 'Syncopate', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-flip { perspective: 1000px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; height: 550px; }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-face { backface-visibility: hidden; position: absolute; width: 100%; height: 100%; }
        .card-back { transform: rotateY(180deg); overflow-y: auto; }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="font-title text-3xl mb-2 bg-gradient-to-r from-purple-400 to-pink-600 bg-clip-text text-transparent">TriviaFlow</h1>
            <div id="qrcode-container" class="flex justify-center mb-4"><div id="qrcode" class="p-2 bg-white rounded-lg"></div></div>
            <p class="text-gray-500 uppercase tracking-widest text-[10px]">Scan to Share Archive</p>
        </header>

        <div id="archive-view" class="grid grid-cols-3 md:grid-cols-5 gap-3"></div>

        <div id="discovery-view" class="hidden">
            <button onclick="showArchive()" class="mb-6 text-sm text-gray-400">← Back to Years</button>
            <div class="card-flip w-full max-w-sm mx-auto">
                <div id="card-inner" class="card-inner relative w-full">
                    <div class="card-face card-front glass rounded-3xl p-8 flex flex-col justify-center items-center text-center" onclick="flipCard()">
                        <span id="card-year" class="text-pink-500 font-bold mb-4"></span>
                        <h2 id="card-album" class="text-2xl font-title mb-2 leading-tight"></h2>
                        <p id="card-artist" class="text-xl text-gray-400"></p>
                        <p class="mt-8 text-xs text-purple-400 animate-pulse font-bold uppercase">Tap to Play Trivia</p>
                    </div>
                    <div class="card-face card-back glass rounded-3xl p-6 flex flex-col bg-white text-black" onclick="event.stopPropagation()">
                        <h3 class="font-bold text-[10px] uppercase text-gray-400 mb-4 tracking-widest">Trivia Question</h3>
                        <p id="card-question" class="text-lg font-bold mb-4 leading-tight text-gray-800"></p>
                        
                        <div id="options-grid" class="space-y-2 mb-6"></div>
                        <div id="feedback" class="hidden text-center p-3 rounded-xl mb-4 font-bold text-sm"></div>

                        <div class="mt-auto bg-gray-50 p-4 rounded-2xl border border-gray-200">
                            <h4 class="text-[10px] font-bold mb-2 uppercase text-gray-500">Join the SeeThree VIP list</h4>
                            <input type="email" placeholder="Email for more 90s trivia" class="w-full p-2 text-sm border rounded mb-2 outline-none">
                            <button class="w-full bg-black text-white text-xs font-bold py-2 rounded-lg uppercase">Join Now</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const musicData = {
            "1995": { artist: "TLC", album: "CrazySexyCool", question: "Which of these was their Grammy-winning #1 hit in '95?", options: ["Waterfalls", "Creep", "Red Light Special", "Diggin' on You"], correct: 1 },
            "1998": { artist: "Lauryn Hill", album: "Miseducation", question: "How many Grammys did Lauryn Hill win in a single night for this album?", options: ["3", "5", "8", "10"], correct: 1 },
            "2004": { artist: "Usher", album: "Confessions", question: "Which track on Confessions stayed #1 on Billboard for 12 weeks?", options: ["Burn", "Caught Up", "Yeah!", "My Boo"], correct: 2 }
            // Add more years here following the same pattern
        };

        new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 80, height: 80 });

        const archiveGrid = document.getElementById('archive-view');
        Object.keys(musicData).forEach(year => {
            const btn = document.createElement('button');
            btn.className = "year-btn glass p-4 rounded-xl font-title text-sm";
            btn.innerText = year;
            btn.onclick = () => showDiscovery(year);
            archiveGrid.appendChild(btn);
        });

        function flipCard() { document.getElementById('card-inner').classList.toggle('is-flipped'); }

        function showDiscovery(year) {
            const data = musicData[year];
            document.getElementById('archive-view').classList.add('hidden');
            document.getElementById('discovery-view').classList.remove('hidden');
            document.getElementById('card-year').innerText = year;
            document.getElementById('card-album').innerText = data.album;
            document.getElementById('card-artist').innerText = data.artist;
            document.getElementById('card-question').innerText = data.question;
            
            const optionsContainer = document.getElementById('options-grid');
            optionsContainer.innerHTML = '';
            data.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full p-3 text-left border rounded-xl text-sm hover:bg-gray-100 transition-colors";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i, data.correct);
                optionsContainer.appendChild(btn);
            });
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('card-inner').classList.remove('is-flipped');
        }

        function checkAnswer(selected, correct) {
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');
            if(selected === correct) {
                feedback.innerText = "CORRECT! 🎉";
                feedback.className = "text-center p-3 rounded-xl mb-4 font-bold text-sm bg-green-100 text-green-700";
            } else {
                feedback.innerText = "NOT QUITE! Try again.";
                feedback.className = "text-center p-3 rounded-xl mb-4 font-bold text-sm bg-red-100 text-red-700";
            }
        }

        function showArchive() {
            document.getElementById('archive-view').classList.remove('hidden');
            document.getElementById('discovery-view').classList.add('hidden');
        }
    </script>
</body>
</html>
