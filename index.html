const BASE_POINTS = 1000;
const SPEED_BONUS = 50; // per second remaining
const MAX_TIME = 15;
// Max per Q: 1000 + (15 x 50) = 1750 | Min per Q: 1000 + (1 x 50) = 1050
function calcPoints(timeLeft) { return BASE_POINTS + (timeLeft * SPEED_BONUS); }

// ─── SHARED LEADERBOARD ──────────────────────────────────────────────────────
const LB_KEY = 'triviaflow_leaderboard_v2';
async function getSharedLeaderboard() {
  try {
    const r = await window.storage.get(LB_KEY, true);
    return r && r.value ? JSON.parse(r.value) : [];
  } catch(e) { return []; }
}
async function saveSharedScore(entry) {
  try {
    let board = await getSharedLeaderboard();
    board.push(entry);
    board = board.sort((a,b) => b.totalPoints - a.totalPoints).slice(0,20);
    await window.storage.set(LB_KEY, JSON.stringify(board), true);
    return board;
  } catch(e) { return []; }
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function MusicTrivia() {
  const [gameState, setGameState] = useState('landing');
  const [playerName, setPlayerName] = useState('');
  const [selectedCategory, setSelectedCategory] = useState(null);
  const [currentQ, setCurrentQ] = useState(0);
  const [totalPoints, setTotalPoints] = useState(0);
  const [correctCount, setCorrectCount] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showAnswer, setShowAnswer] = useState(false);
  const [timer, setTimer] = useState(MAX_TIME);
  const [questions, setQuestions] = useState([]);
  const [leaderboard, setLeaderboard] = useState([]);
  const [boardLoading, setBoardLoading] = useState(true);
  const [savingScore, setSavingScore] = useState(false);
  const [lastPts, setLastPts] = useState(null);
  const [showPtsPop, setShowPtsPop] = useState(false);
  const timerRef = useRef(MAX_TIME);

  const refreshBoard = useCallback(async () => {
    setBoardLoading(true);
    setLeaderboard(await getSharedLeaderboard());
    setBoardLoading(false);
  }, []);

  useEffect(() => { refreshBoard(); }, []);
  useEffect(() => { if (gameState === 'landing') refreshBoard(); }, [gameState]);

  useEffect(() => {
    if (gameState !== 'playing' || showAnswer) return;
    if (timer <= 0) {
      setShowAnswer(true); setLastPts(0); setShowPtsPop(true);
      setTimeout(() => setShowPtsPop(false), 900);
      return;
    }
    const id = setInterval(() => setTimer(t => { timerRef.current = t-1; return t-1; }), 1000);
    return () => clearInterval(id);
  }, [timer, showAnswer, gameState]);

  const handleAnswer = (idx) => {
    if (showAnswer || selected !== null) return;
    const tl = timerRef.current;
    setSelected(idx);
    setShowAnswer(true);
    const correct = idx === questions[currentQ].correctIndex;
    const pts = correct ? calcPoints(tl) : 0;
    if (correct) { setTotalPoints(p => p+pts); setCorrectCount(c => c+1); }
    setLastPts(pts);
    setShowPtsPop(true);
    setTimeout(() => setShowPtsPop(false), 950);
  };

  const nextQ = async () => {
    if (currentQ < questions.length - 1) {
      setCurrentQ(q => q+1); setSelected(null); setShowAnswer(false);
      setTimer(MAX_TIME); timerRef.current = MAX_TIME; setShowPtsPop(false);
    } else {
      await saveScore();
      setGameState('finished');
    }
  };

  const saveScore = async () => {
    setSavingScore(true);
    const entry = { name: playerName||'Anonymous', totalPoints, correctCount, totalQuestions: questions.length, category: selectedCategory, date: new Date().toISOString() };
    setLeaderboard(await saveSharedScore(entry));
    setSavingScore(false);
  };

  const startGame = () => {
    const cat = categories.find(c => c.id === selectedCategory);
    let pool = cat.years ? triviaQuestions.filter(q => cat.years.includes(q.year)) : triviaQuestions;
    if (!pool.length) pool = triviaQuestions;
    const qs = [...pool].sort(() => Math.random()-0.5).slice(0,10).map(q => {
      const opts = [...q.options].sort(() => Math.random()-0.5);
      return {...q, options: opts, correctIndex: opts.indexOf(q.answer)};
    });
    setQuestions(qs); setGameState('playing');
    setCurrentQ(0); setTotalPoints(0); setCorrectCount(0);
    setSelected(null); setShowAnswer(false);
    setTimer(MAX_TIME); timerRef.current = MAX_TIME;
  };

  const btnClass = (idx) => {
    const base = 'w-full p-4 rounded-xl font-bold text-lg transition-all duration-300 border-2 text-left';
    if (!showAnswer) return `${base} bg-gradient-to-r from-purple-600 to-pink-600 border-purple-400 active:scale-95 text-white`;
    if (idx === questions[currentQ].correctIndex) return `${base} bg-green-600 border-green-400 text-white`;
    if (idx === selected) return `${base} bg-red-600 border-red-400 text-white`;
    return `${base} bg-gray-700 border-gray-600 text-gray-300`;
  };

  const medal = (i) => ['🥇','🥈','🥉'][i] || `#${i+1}`;

  // LEADERBOARD COMPONENT
  const Board = ({ hName, hPts }) => (
    <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-6 border-2 border-yellow-400/30">
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-2xl font-black text-yellow-400">🏆 GLOBAL LEADERBOARD</h2>
        <button onClick={refreshBoard} className="text-xs text-cyan-400 underline">↻ Refresh</button>
      </div>
      {boardLoading ? (
        <div className="text-center py-6"><div className="text-4xl spinner inline-block">⏳</div><p className="text-gray-400 mt-2">Loading...</p></div>
      ) : leaderboard.length === 0 ? (
        <p className="text-gray-400 text-center py-4">No scores yet — be the first! 🎤</p>
      ) : leaderboard.slice(0,10).map((e,i) => {
        const me = hName && e.name===hName && e.totalPoints===hPts;
        return (
          <div key={i} className={`flex items-center justify-between p-3 rounded-xl mb-2 ${me?'bg-yellow-400/20 border-2 border-yellow-400':'bg-gray-800/50'}`}>
            <div className="flex items-center gap-3">
              <span className={`text-lg font-black w-8 ${i===0?'text-yellow-400':i===1?'text-gray-300':i===2?'text-orange-400':'text-gray-500'}`}>{medal(i)}</span>
              <div>
                <div className="text-white font-bold text-sm">{e.name}{me?' ← YOU':''}</div>
                <div className="text-xs text-gray-400">{e.correctCount}/{e.totalQuestions} correct</div>
              </div>
            </div>
            <div className="text-right">
              <div className="text-lg font-black text-cyan-400">{e.totalPoints?.toLocaleString()}</div>
              <div className="text-xs text-gray-500">pts</div>
            </div>
          </div>
        );
      })}
    </div>
  );

  // ── LANDING ───────────────────────────────────────────────────────────────
  if (gameState === 'landing') {
    const qr = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent('https://trivia-flow-sigma.vercel.app/')}`;
    return (
      <div className="min-h-screen bg-gradient-to-br from-gray-900 via-purple-900 to-black p-6 flex items-center justify-center">
        <div className="max-w-2xl w-full space-y-6">
          <div className="text-center slide-up">
            <h1 className="text-7xl md:text-8xl font-black mb-2" style={{background:'linear-gradient(135deg,#00F0FF,#FF10F0,#FFFF00)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>R&B TRIVIA</h1>
            <p className="text-cyan-400 text-2xl neon-text uppercase tracking-widest mb-1">1990–2010 Classics</p>
            <p className="text-gray-400">Speed Scoring · Global Leaderboard · Max 17,500 pts</p>
          </div>

          {/* Scoring explainer */}
          <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-5 border-2 border-purple-400/30 slide-up" style={{animationDelay:'0.05s'}}>
            <h3 className="text-base font-black text-purple-300 mb-3 uppercase tracking-wider">⚡ Speed Scoring — Answer Fast, Score More</h3>
            <div className="grid grid-cols-3 gap-3 text-center">
              <div className="bg-gray-800/60 rounded-xl p-3">
                <div className="text-yellow-400 font-black text-xl">1,750</div>
                <div className="text-gray-400 text-xs mt-1">Answer in 1s</div>
              </div>
              <div className="bg-gray-800/60 rounded-xl p-3">
                <div className="text-cyan-400 font-black text-xl">1,400</div>
                <div className="text-gray-400 text-xs mt-1">Answer in 7s</div>
              </div>
              <div className="bg-gray-800/60 rounded-xl p-3">
                <div className="text-pink-400 font-black text-xl">1,050</div>
                <div className="text-gray-400 text-xs mt-1">Answer in 14s</div>
              </div>
            </div>
            <p className="text-gray-500 text-xs text-center mt-3">Wrong answer or timeout = 0 pts</p>
          </div>

          <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-8 border-2 border-pink-400/30 slide-up text-center" style={{animationDelay:'0.1s'}}>
            <h2 className="text-2xl font-bold text-white mb-4">📱 Share with Friends</h2>
            <div className="bg-white p-4 rounded-2xl inline-block" style={{boxShadow:'0 0 40px rgba(0,240,255,0.4)'}}>
              <img src={qr} alt="Scan to play" className="w-48 h-48" loading="lazy" />
            </div>
            <p className="text-cyan-400 text-sm uppercase tracking-wider mt-3">Scan to Play</p>
          </div>

          <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-8 border-2 border-cyan-400/30 slide-up" style={{animationDelay:'0.2s'}}>
            <h2 className="text-2xl font-bold text-white mb-6">Enter Your Name</h2>
            <input type="text" value={playerName} onChange={e=>setPlayerName(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&playerName.trim()&&setGameState('category')&&setPlayerName(playerName)}
              placeholder="Your name..." maxLength={20}
              className="w-full px-6 py-4 rounded-xl bg-gray-800 border-2 border-purple-500 text-white text-xl focus:outline-none focus:border-cyan-400 mb-4" />
            <button onClick={()=>{if(playerName.trim()){setPlayerName(playerName);setGameState('category');}}} disabled={!playerName.trim()}
              className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-2xl py-5 rounded-xl hover:scale-105 transition shadow-2xl disabled:opacity-50 disabled:cursor-not-allowed">
              START PLAYING 🎵
            </button>
          </div>

          <div className="slide-up" style={{animationDelay:'0.4s'}}><Board /></div>
        </div>
      </div>
    );
  }

  // ── CATEGORY ──────────────────────────────────────────────────────────────
  if (gameState === 'category') return (
    <div className="min-h-screen bg-gradient-to-br from-gray-900 via-black to-gray-900 p-6">
      <div className="max-w-2xl mx-auto">
        <div className="text-center mb-10 mt-8">
          <h1 className="text-5xl font-black mb-3" style={{background:'linear-gradient(90deg,#00F0FF,#FF10F0)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>HEY {playerName}! 👋</h1>
          <p className="text-cyan-400 text-xl neon-text uppercase tracking-widest">Select An Era</p>
        </div>
        <div className="grid grid-cols-2 gap-4 mb-6">
          {categories.map(cat => (
            <button key={cat.id} onClick={()=>{setSelectedCategory(cat.id);setGameState('start');}}
              className={`bg-gradient-to-br ${cat.color} p-6 rounded-2xl border-2 border-cyan-400/30 hover:border-cyan-400 hover:scale-105 transition-all duration-300 shadow-lg`}>
              <div className="text-5xl mb-3">{cat.emoji}</div>
              <div className="text-white font-black text-lg tracking-wider">{cat.name}</div>
            </button>
          ))}
        </div>
        <button onClick={()=>{setGameState('landing');setPlayerName('');}} className="w-full bg-gray-800 text-white font-bold py-3 rounded-xl hover:bg-gray-700 transition">← Back to Home</button>
      </div>
    </div>
  );

  // ── START ─────────────────────────────────────────────────────────────────
  if (gameState === 'start') {
    const cat = categories.find(c=>c.id===selectedCategory);
    return (
      <div className="min-h-screen bg-gradient-to-br from-purple-900 via-pink-900 to-red-900 flex items-center justify-center p-4">
        <div className="max-w-md w-full text-center space-y-6">
          <div className="text-8xl">{cat.emoji}</div>
          <h1 className="text-5xl font-black text-white">{cat.name}</h1>
          <div className="bg-black/30 backdrop-blur-sm rounded-2xl p-6 space-y-2">
            <div className="text-white text-lg">⚡ 10 Questions</div>
            <div className="text-white text-lg">⏱️ 15 Seconds Each</div>
            <div className="text-white text-lg">🏆 Max 17,500 Points</div>
            <div className="text-yellow-300 text-sm mt-2">Faster = More Points. Speed matters!</div>
          </div>
          <button onClick={startGame} className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-xl py-4 rounded-full hover:scale-105 transition shadow-2xl">START GAME</button>
          <button onClick={()=>{setGameState('category');setSelectedCategory(null);}} className="w-full bg-gray-700 text-white font-bold text-lg py-3 rounded-full hover:bg-gray-600 transition">← Back to Eras</button>
        </div>
      </div>
    );
  }

  // ── FINISHED ──────────────────────────────────────────────────────────────
  if (gameState === 'finished') {
    const rank = leaderboard.findIndex(e=>e.name===playerName&&e.totalPoints===totalPoints)+1;
    const pct = Math.round((correctCount/questions.length)*100);
    return (
      <div className="min-h-screen bg-gradient-to-br from-purple-900 via-pink-900 to-red-900 p-4 overflow-y-auto">
        <div className="max-w-2xl mx-auto py-6 space-y-6">
          <div className="text-center space-y-4">
            <div className="text-8xl">🏆</div>
            <h1 className="text-5xl font-black text-white">FINISHED!</h1>
            <div className="bg-black/30 backdrop-blur-sm rounded-2xl p-8 space-y-3">
              <div className="text-2xl text-gray-300">Hey {playerName}!</div>
              <div className="text-6xl font-black text-yellow-400">{totalPoints.toLocaleString()}</div>
              <div className="text-xl text-cyan-400 font-bold uppercase tracking-wider">Points</div>
              <div className="text-lg text-white">{correctCount}/{questions.length} correct · {pct}%</div>
              {rank>0&&rank<=20&&<div className="text-xl text-green-400">🎉 You're #{rank} globally!</div>}
              <div className="text-2xl text-pink-300">{pct>=80?"🎤 R&B LEGEND!":pct>=60?"💿 Soul Music Fan!":pct>=40?"🎵 Getting There!":"📻 Keep Listening!"}</div>
            </div>
          </div>
          {savingScore ? (
            <div className="text-center py-4"><div className="text-3xl spinner inline-block">💾</div><p className="text-cyan-400 mt-2">Saving score...</p></div>
          ) : <Board hName={playerName} hPts={totalPoints} />}
          <button onClick={startGame} className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-xl py-4 rounded-full hover:scale-105 transition shadow-2xl">PLAY AGAIN</button>
          <button onClick={()=>{setGameState('category');setSelectedCategory(null);}} className="w-full bg-gray-700 text-white font-bold text-lg py-3 rounded-full hover:bg-gray-600 transition">← Choose Different Era</button>
          <button onClick={()=>{setGameState('landing');setPlayerName('');setSelectedCategory(null);}} className="w-full bg-gray-800 text-white font-bold py-3 rounded-full hover:bg-gray-700 transition">🏠 Back to Home</button>
        </div>
      </div>
    );
  }

  // ── PLAYING ───────────────────────────────────────────────────────────────
  const q = questions[currentQ];
  const potential = calcPoints(timer);

  return (
    <div className="min-h-screen bg-gradient-to-br from-purple-900 via-pink-900 to-red-900 p-4">
      <div className="max-w-2xl mx-auto py-6 space-y-4">

        {/* Stats bar */}
        <div className="flex justify-between items-center gap-2">
          <div className="bg-black/40 backdrop-blur-sm px-4 py-2 rounded-xl text-center flex-1">
            <div className="text-xs text-gray-400">QUESTION</div>
            <div className="text-lg font-bold text-white">{currentQ+1}/{questions.length}</div>
          </div>
          <div className="bg-black/40 backdrop-blur-sm px-4 py-2 rounded-xl text-center flex-1">
            <div className="text-xs text-gray-400">SCORE</div>
            <div className="text-lg font-black text-yellow-400">{totalPoints.toLocaleString()}</div>
          </div>
          <div className="bg-black/40 backdrop-blur-sm px-4 py-2 rounded-xl text-center flex-1">
            <div className="text-xs text-gray-400">CORRECT</div>
            <div className="text-lg font-black text-green-400">{correctCount}</div>
          </div>
        </div>

        {/* Timer bar */}
        <div className="bg-black/40 backdrop-blur-sm rounded-xl p-4">
          <div className="flex items-center justify-between mb-2">
            <span className="text-white font-bold">⏱️ Time Left</span>
            <div className="flex items-center gap-3">
              {!showAnswer && <span className="text-sm font-bold text-yellow-300">+{potential.toLocaleString()} pts</span>}
              <span className={`text-2xl font-black ${timer<=5?'text-red-400 animate-pulse':timer<=10?'text-orange-400':'text-yellow-400'}`}>{timer}s</span>
            </div>
          </div>
          <div className="h-4 bg-gray-700 rounded-full overflow-hidden">
            <div className={`h-full transition-all duration-1000 rounded-full ${timer<=5?'bg-red-500':timer<=10?'bg-orange-400':'bg-yellow-400'}`} style={{width:`${(timer/MAX_TIME)*100}%`}}/>
          </div>
        </div>

        {/* Question card */}
        <div className="bg-black/50 backdrop-blur-sm rounded-2xl p-6 shadow-2xl relative overflow-hidden">
          <div className="text-xs text-cyan-400 uppercase tracking-wider mb-2">{q.year} · R&B</div>
          <h2 className="text-2xl md:text-3xl font-black text-white text-center leading-tight">{q.question}</h2>
          {showPtsPop && (
            <div className={`absolute top-3 right-4 text-2xl font-black points-fly ${lastPts>0?'text-yellow-300':'text-red-400'}`}>
              {lastPts>0?`+${lastPts.toLocaleString()} ⚡`:'MISS! ❌'}
            </div>
          )}
        </div>

        {/* Answer buttons */}
        <div className="space-y-3">
          {q.options.map((opt,i) => (
            <button key={i} onClick={()=>handleAnswer(i)} disabled={showAnswer} className={btnClass(i)}>
              <span className="mr-2 opacity-60 text-sm">{String.fromCharCode(65+i)}.</span>{opt}
            </button>
          ))}
        </div>

        {showAnswer && (
          <button onClick={nextQ} className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-xl py-4 rounded-full hover:scale-105 transition shadow-2xl">
            {currentQ<questions.length-1?'NEXT QUESTION →':'SEE RESULTS 🏆'}
          </button>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<MusicTrivia />, document.getElementById('root'));
</script>
</body>
</html>
