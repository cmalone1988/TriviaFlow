        function MusicTrivia() {
            const [gameState, setGameState] = useState('landing');
            const [playerName, setPlayerName] = useState('');
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [selected, setSelected] = useState(null);
            const [showAnswer, setShowAnswer] = useState(false);
            const [timer, setTimer] = useState(15);
            const [questions, setQuestions] = useState([]);
            const [leaderboard, setLeaderboard] = useState([]);

            useEffect(() => {
                const saved = localStorage.getItem('rnb_trivia_leaderboard');
                if (saved) setLeaderboard(JSON.parse(saved));
            }, []);

            useEffect(() => {
                if (gameState === 'playing' && !showAnswer && timer > 0) {
                    const interval = setInterval(() => setTimer(t => t - 1), 1000);
                    return () => clearInterval(interval);
                }
                if (timer === 0 && !showAnswer) setShowAnswer(true);
            }, [timer, showAnswer, gameState]);

            const saveScore = (finalScore) => {
                const newEntry = {
                    name: playerName || 'Anonymous',
                    score: finalScore,
                    total: questions.length,
                    percentage: Math.round((finalScore / questions.length) * 100),
                    category: selectedCategory,
                    date: new Date().toISOString()
                };
                const updated = [...leaderboard, newEntry].sort((a, b) => b.percentage - a.percentage).slice(0, 10);
                setLeaderboard(updated);
                localStorage.setItem('rnb_trivia_leaderboard', JSON.stringify(updated));
            };

            const startFromLanding = (name) => {
                setPlayerName(name);
                setGameState('category');
            };

            const selectCategory = (categoryId) => {
                setSelectedCategory(categoryId);
                setGameState('start');
            };

            const startGame = () => {
                const cat = categories.find(c => c.id === selectedCategory);
                let filtered;
                if (cat.years) {
                    filtered = triviaQuestions.filter(q => cat.years.includes(q.year));
                } else {
                    filtered = triviaQuestions;
                }
                
                // Shuffle questions and randomize answer positions
                const shuffled = [...filtered].sort(() => Math.random() - 0.5).slice(0, 10);
                
                // Randomize answer order for each question
                const questionsWithShuffledAnswers = shuffled.map(q => {
                    const correctAnswer = q.answer;
                    const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
                    const newCorrectIndex = shuffledOptions.indexOf(correctAnswer);
                    
                    return {
                        ...q,
                        options: shuffledOptions,
                        correctIndex: newCorrectIndex,
                        correctAnswer: correctAnswer
                    };
                });
                
                setQuestions(questionsWithShuffledAnswers);
                setGameState('playing');
                setCurrentQ(0);
                setScore(0);
                setSelected(null);
                setShowAnswer(false);
                setTimer(15);
            };

            const selectAnswer = (idx) => {
                if (showAnswer || selected !== null) return;
                setSelected(idx);
                setShowAnswer(true);
                if (idx === questions[currentQ].correctIndex) {
                    setScore(score + 1);
                }
            };

            const nextQuestion = () => {
                if (currentQ < questions.length - 1) {
                    setCurrentQ(currentQ + 1);
                    setSelected(null);
                    setShowAnswer(false);
                    setTimer(15);
                } else {
                    saveScore(score);
                    setGameState('finished');
                }
            };

            const backToCategories = () => {
                setGameState('category');
                setSelectedCategory(null);
            };

            const backToLanding = () => {
                setGameState('landing');
                setPlayerName('');
                setSelectedCategory(null);
            };

            const getButtonClass = (idx) => {
                const base = 'w-full p-4 rounded-xl font-bold text-lg transition-all duration-300 border-2';
                if (!showAnswer) return `${base} bg-gradient-to-r from-purple-600 to-pink-600 border-purple-400 active:scale-95 text-white`;
                const correctIdx = questions[currentQ].correctIndex;
                if (idx === correctIdx) return `${base} bg-green-600 border-green-400 text-white`;
                if (idx === selected && idx !== correctIdx) return `${base} bg-red-600 border-red-400 text-white`;
                return `${base} bg-gray-700 border-gray-600 text-gray-300`;
            };

            // LANDING PAGE
            if (gameState === 'landing') {
                // QR Code embedded directly - no file needed!
                const qrCodeURL = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent('https://trivia-flow-sigma.vercel.app/')}`;
                
                return (
                    <div className="min-h-screen bg-gradient-to-br from-gray-900 via-purple-900 to-black p-6 flex items-center justify-center">
                        <div className="max-w-2xl w-full">
                            <div className="text-center mb-12 slide-up">
                                <h1 className="text-7xl md:text-8xl font-black mb-4" style={{
                                    background: 'linear-gradient(135deg, #00F0FF, #FF10F0, #FFFF00)',
                                    WebkitBackgroundClip: 'text',
                                    WebkitTextFillColor: 'transparent'
                                }}>
                                    R&B TRIVIA
                                </h1>
                                <p className="text-cyan-400 text-2xl neon-text uppercase tracking-widest mb-2">1995-2009 Classics</p>
                                <p className="text-gray-400 text-lg">100 Questions • 8 Eras • Endless Fun</p>
                            </div>

                            {/* QR CODE SECTION - EMBEDDED */}
                            <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-8 mb-8 border-2 border-pink-400/30 slide-up text-center" style={{animationDelay: '0.1s'}}>
                                <h2 className="text-2xl font-bold text-white mb-4">📱 Share with Friends</h2>
                                <div className="bg-white p-4 rounded-2xl inline-block mb-4 shadow-2xl" style={{
                                    boxShadow: '0 0 40px rgba(0, 240, 255, 0.4), 0 0 80px rgba(255, 16, 240, 0.2)'
                                }}>
                                    <img 
                                        src={qrCodeURL}
                                        alt="Scan to play R&B Trivia" 
                                        className="w-64 h-64"
                                        loading="lazy"
                                    />
                                </div>
                                <p className="text-cyan-400 text-sm uppercase tracking-wider">Scan to Play</p>
                            </div>

                            <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-8 mb-8 border-2 border-cyan-400/30 slide-up" style={{animationDelay: '0.2s'}}>
                                <h2 className="text-2xl font-bold text-white mb-6">Enter Your Name</h2>
                                <input
                                    type="text"
                                    value={playerName}
                                    onChange={(e) => setPlayerName(e.target.value)}
                                    placeholder="Your name..."
                                    className="w-full px-6 py-4 rounded-xl bg-gray-800 border-2 border-purple-500 text-white text-xl focus:outline-none focus:border-cyan-400 mb-4"
                                    maxLength={20}
                                />
                                <button
                                    onClick={() => startFromLanding(playerName)}
                                    disabled={!playerName.trim()}
                                    className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-2xl py-5 rounded-xl hover:scale-105 transition shadow-2xl disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    START PLAYING 🎵
                                </button>
                            </div>

                            {leaderboard.length > 0 && (
                                <div className="bg-black/40 backdrop-blur-sm rounded-3xl p-8 border-2 border-yellow-400/30 slide-up" style={{animationDelay: '0.4s'}}>
                                    <h2 className="text-3xl font-black text-yellow-400 mb-6 flex items-center gap-3">
                                        🏆 TOP PLAYERS
                                    </h2>
                                    <div className="space-y-3">
                                        {leaderboard.slice(0, 5).map((entry, idx) => (
                                            <div key={idx} className="flex items-center justify-between bg-gray-800/50 p-4 rounded-xl">
                                                <div className="flex items-center gap-4">
                                                    <div className={`text-2xl font-black ${idx === 0 ? 'text-yellow-400' : idx === 1 ? 'text-gray-300' : idx === 2 ? 'text-orange-400' : 'text-gray-500'}`}>
                                                        #{idx + 1}
                                                    </div>
                                                    <div>
                                                        <div className="text-white font-bold">{entry.name}</div>
                                                        <div className="text-sm text-gray-400">{entry.score}/{entry.total} correct</div>
                                                    </div>
                                                </div>
                                                <div className="text-2xl font-black text-cyan-400">{entry.percentage}%</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // CATEGORY SELECTION
            if (gameState === 'category') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-gray-900 via-black to-gray-900 p-6">
                        <div className="max-w-2xl mx-auto">
                            <div className="text-center mb-12 mt-8">
                                <h1 className="text-6xl font-black mb-4" style={{
                                    background: 'linear-gradient(90deg, #00F0FF, #FF10F0)',
                                    WebkitBackgroundClip: 'text',
                                    WebkitTextFillColor: 'transparent'
                                }}>
                                    HEY {playerName}! 👋
                                </h1>
                                <p className="text-cyan-400 text-xl neon-text uppercase tracking-widest">Select An Era</p>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                {categories.map(cat => (
                                    <button
                                        key={cat.id}
                                        onClick={() => selectCategory(cat.id)}
                                        className={`bg-gradient-to-br ${cat.color} p-6 rounded-2xl border-2 border-cyan-400/30 hover:border-cyan-400 hover:scale-105 transition-all duration-300 shadow-lg hover:shadow-cyan-400/50`}
                                    >
                                        <div className="text-5xl mb-3">{cat.emoji}</div>
                                        <div className="text-white font-black text-lg tracking-wider">{cat.name}</div>
                                    </button>
                                ))}
                            </div>

                            <button onClick={backToLanding} className="w-full bg-gray-800 text-white font-bold py-3 rounded-xl hover:bg-gray-700 transition">
                                ← Back to Home
                            </button>
                        </div>
                    </div>
                );
            }

            // START SCREEN
            if (gameState === 'start') {
                const selectedCat = categories.find(c => c.id === selectedCategory);
                return (
                    <div className="min-h-screen bg-gradient-to-br from-purple-900 via-pink-900 to-red-900 flex items-center justify-center p-4">
                        <div className="max-w-md w-full text-center space-y-6">
                            <div className="text-8xl">{selectedCat.emoji}</div>
                            <h1 className="text-5xl font-black text-white">{selectedCat.name}</h1>
                            <div className="bg-black/30 backdrop-blur-sm rounded-2xl p-6 space-y-3">
                                <div className="flex items-center justify-center gap-2 text-white text-lg">⚡ 10 Questions</div>
                                <div className="flex items-center justify-center gap-2 text-white text-lg">⏱️ 15 Seconds Each</div>
                                <div className="flex items-center justify-center gap-2 text-white text-lg">🎤 Classic R&B Hits</div>
                            </div>
                            <button onClick={startGame} className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-xl py-4 rounded-full hover:scale-105 transition shadow-2xl">
                                START GAME
                            </button>
                            <button onClick={backToCategories} className="w-full bg-gray-700 text-white font-bold text-lg py-3 rounded-full hover:bg-gray-600 transition">
                                ← Back to Eras
                            </button>
                        </div>
                    </div>
                );
            }

            // FINISHED SCREEN WITH LEADERBOARD
            if (gameState === 'finished') {
                const percentage = Math.round((score / questions.length) * 100);
                const rank = leaderboard.findIndex(e => e.name === playerName && e.percentage === percentage) + 1;
                return (
                    <div className="min-h-screen bg-gradient-to-br from-purple-900 via-pink-900 to-red-900 p-4 overflow-y-auto">
                        <div className="max-w-2xl mx-auto py-6 space-y-6">
                            <div className="text-center space-y-6">
                                <div className="text-8xl">🏆</div>
                                <h1 className="text-5xl font-black text-white">FINISHED!</h1>
                                <div className="bg-black/30 backdrop-blur-sm rounded-2xl p-8 space-y-4">
                                    <div className="text-2xl text-gray-300">Hey {playerName}!</div>
                                    <div className="text-7xl font-black text-yellow-400">{score}/{questions.length}</div>
                                    <div className="text-3xl font-bold text-white">{percentage}%</div>
                                    {rank > 0 && rank <= 10 && (
                                        <div className="text-xl text-cyan-400">🎉 You're #{rank} on the leaderboard!</div>
                                    )}
                                    <div className="text-2xl text-pink-300">
                                        {percentage >= 80 ? "🎤 R&B LEGEND!" : percentage >= 60 ? "💿 Soul Music Fan!" : percentage >= 40 ? "🎵 Getting There!" : "📻 Keep Listening!"}
                                    </div>
                                </div>

                                {leaderboard.length > 0 && (
                                    <div className="bg-black/30 backdrop-blur-sm rounded-2xl p-6">
                                        <h2 className="text-2xl font-black text-yellow-400 mb-4">🏆 LEADERBOARD</h2>
                                        <div className="space-y-2">
                                            {leaderboard.slice(0, 5).map((entry, idx) => (
                                                <div key={idx} className={`flex items-center justify-between p-3 rounded-lg ${entry.name === playerName && entry.percentage === percentage ? 'bg-yellow-400/20 border-2 border-yellow-400' : 'bg-gray-800/50'}`}>
                                                    <div className="flex items-center gap-3">
                                                        <div className={`text-lg font-black ${idx === 0 ? 'text-yellow-400' : idx === 1 ? 'text-gray-300' : idx === 2 ? 'text-orange-400' : 'text-gray-500'}`}>
                                                            #{idx + 1}
                                                        </div>
                                                        <div className="text-white font-bold">{entry.name}</div>
                                                    </div>
                                                    <div className="text-xl font-black text-cyan-400">{entry.percentage}%</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <button onClick={startGame} className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-xl py-4 rounded-full hover:scale-105 transition shadow-2xl">
                                    PLAY AGAIN
                                </button>
                                <button onClick={backToCategories} className="w-full bg-gray-700 text-white font-bold text-lg py-3 rounded-full hover:bg-gray-600 transition">
                                    ← Choose Different Era
                                </button>
                                <button onClick={backToLanding} className="w-full bg-gray-800 text-white font-bold py-3 rounded-full hover:bg-gray-700 transition">
                                    🏠 Back to Home
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // PLAYING SCREEN
            const question = questions[currentQ];
            return (
                <div className="min-h-screen bg-gradient-to-br from-purple-900 via-pink-900 to-red-900 p-4">
                    <div className="max-w-2xl mx-auto py-6 space-y-6">
                        <div className="flex justify-between items-center">
                            <div className="bg-black/40 backdrop-blur-sm px-4 py-2 rounded-xl">
                                <div className="text-lg font-bold text-white">Q {currentQ + 1}/{questions.length}</div>
                            </div>
                            <div className="bg-black/40 backdrop-blur-sm px-4 py-2 rounded-xl">
                                <div className="text-sm text-cyan-400">{question.year}</div>
                            </div>
                            <div className="bg-black/40 backdrop-blur-sm px-4 py-2 rounded-xl">
                                <div className="text-lg font-bold text-yellow-400">Score: {score}</div>
                            </div>
                        </div>
                        <div className="bg-black/40 backdrop-blur-sm rounded-xl p-4">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-white font-bold">⏱️ Time Left</span>
                                <span className={`text-2xl font-black ${timer <= 5 ? 'text-red-400 animate-pulse' : 'text-yellow-400'}`}>{timer}s</span>
                            </div>
                            <div className="h-3 bg-gray-700 rounded-full overflow-hidden">
                                <div className={`h-full transition-all duration-1000 ${timer <= 5 ? 'bg-red-500' : 'bg-yellow-400'}`} style={{width: `${(timer/15)*100}%`}}/>
                            </div>
                        </div>
                        <div className="bg-black/50 backdrop-blur-sm rounded-2xl p-6 shadow-2xl">
                            <h2 className="text-2xl md:text-3xl font-black text-white text-center leading-tight">{question.question}</h2>
                        </div>
                        <div className="space-y-3">
                            {question.options.map((option, idx) => (
                                <button key={idx} onClick={() => selectAnswer(idx)} disabled={showAnswer} className={getButtonClass(idx)}>
                                    {option}
                                </button>
                            ))}
                        </div>
                        {showAnswer && (
                            <button onClick={nextQuestion} className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-black text-xl py-4 rounded-full hover:scale-105 transition shadow-2xl">
                                {currentQ < questions.length - 1 ? 'NEXT QUESTION →' : 'SEE RESULTS'}
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<MusicTrivia />, document.getElementById('root'));
    </script>
</body>
</html>
