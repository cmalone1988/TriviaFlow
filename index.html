<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90s & 2000s Music Trivia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        .font-title { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: -1px; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(45deg, #ff00cc, #3333ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="game-container" class="w-full max-w-md glass rounded-3xl p-8 shadow-2xl">
        <div class="mb-8 text-center">
            <h1 class="font-title text-2xl mb-2 gradient-text">TriviaFlow</h1>
            <div class="flex justify-between text-xs text-gray-400 font-bold uppercase tracking-widest">
                <span id="category-label">90s R&B</span>
                <span id="score-label">Score: 0</span>
            </div>
        </div>

        <div id="question-card" class="mb-8">
            <p id="question-text" class="text-xl font-medium leading-tight mb-6">Loading your first question...</p>
            <div id="options-container" class="space-y-3">
                </div>
        </div>

        <div class="w-full bg-white/10 h-1 rounded-full overflow-hidden">
            <div id="progress-bar" class="bg-gradient-to-r from-pink-500 to-blue-500 h-full transition-all duration-500" style="width: 0%"></div>
        </div>
    </div>

    <script>
        const questions = [
            { question: "Which girl group told us not to go chasing waterfalls in 1994?", options: ["SWV", "En Vogue", "TLC", "Xscape"], correct: 2, category: "90s R&B" },
            { question: "Who took us to '808s & Heartbreak' and later 'The Graduation'?", options: ["Jay-Z", "Kanye West", "Ludacris", "Nelly"], correct: 1, category: "2000s Hip Hop" },
            { question: "Aaliyah's final self-titled album featured which hit single?", options: ["Rock the Boat", "Try Again", "Are You That Somebody", "Back & Forth"], correct: 0, category: "2000s R&B" },
            { question: "What was the debut single for Outkast in 1993?", options: ["Rosa Parks", "Ms. Jackson", "Player's Ball", "So Fresh, So Clean"], correct: 2, category: "90s Hip Hop" },
            { question: "Usher's 2004 album 'Confessions' featured which crunk-styled hit?", options: ["Burn", "Yeah!", "Caught Up", "My Boo"], correct: 1, category: "2000s R&B" }
        ];

        let currentQ = 0;
        let score = 0;

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('category-label').innerText = q.category;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-left hover:bg-white/10 transition-all active:scale-95";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i);
                container.appendChild(btn);
            });
            
            document.getElementById('progress-bar').style.width = `${(currentQ / questions.length) * 100}%`;
        }

        function checkAnswer(choice) {
            if(choice === questions[currentQ].correct) {
                score += 10;
                document.getElementById('score-label').innerText = `Score: ${score}`;
            }
            currentQ++;
            if(currentQ < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('question-card').innerHTML = `
                <div class="text-center py-8">
                    <h2 class="text-4xl font-title mb-4">FINISH</h2>
                    <p class="text-gray-400 mb-6">You scored ${score} points!</p>
                    <button onclick="location.reload()" class="px-8 py-3 rounded-full bg-white text-black font-bold">PLAY AGAIN</button>
                </div>
            `;
            document.getElementById('progress-bar').style.width = "100%";
        }

        loadQuestion();
    </script>
</body>
</html>
