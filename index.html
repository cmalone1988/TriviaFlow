<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TriviaFlow - R&B Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; scroll-behavior: smooth; }
        .font-retro { font-family: 'Orbitron', sans-serif; }
        .neon-grid {
            background-image: linear-gradient(0deg, transparent 24%, rgba(0, 255, 255, .05) 25%, rgba(0, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, .05) 75%, rgba(0, 255, 255, .05) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, .05) 25%, rgba(0, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, .05) 75%, rgba(0, 255, 255, .05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-neon { background: linear-gradient(45deg, #ff00cc, #3333ff); box-shadow: 0 0 20px rgba(255, 0, 204, 0.4); transition: all 0.3s ease; }
        .btn-neon:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 0, 204, 0.6); }
        #qrcode img { margin: 0 auto; border-radius: 8px; }
    </style>
</head>
<body class="neon-grid">

    <section class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-8">
            <h1 class="font-retro text-5xl md:text-7xl mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500">TRIVIAFLOW</h1>
            <p class="text-cyan-400 tracking-widest text-xs uppercase">System Status: 1995-2009 R&B Active</p>
        </div>

        <div class="glass p-8 rounded-3xl max-w-sm w-full mb-10 border-cyan-500/30">
            <div id="qrcode" class="flex justify-center p-3 bg-white rounded-xl mb-6 mx-auto w-48 h-48 shadow-[0_0_20px_rgba(0,240,255,0.5)]"></div>
            
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-6 italic">Scan to play on your phone at the lounge</p>
            
            <button onclick="document.getElementById('app-section').scrollIntoView()" class="btn-neon w-full py-4 rounded-full font-black text-white uppercase tracking-tighter">Enter The Archive</button>
        </div>
    </section>

    <section id="app-section" class="min-h-screen p-6 pt-20">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-center font-retro text-2xl mb-10 text-pink-500">SELECT ERA</h2>
            <div id="category-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                </div>
        </div>
    </section>

    <script>
        // 1. GENERATE THE QR CODE AUTOMATICALLY
        // This takes your live Vercel URL and turns it into the QR image
        window.onload = function() {
            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href,
                width: 170,
                height: 170,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        };

        // 2. DATA (Simplified for example, but keep your 100 questions here)
        const eras = [1995, 1996, 1997, 1998, 1999, 2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009];
        const grid = document.getElementById('category-grid');
        
        eras.forEach(year => {
            const btn = document.createElement('button');
            btn.className = "glass p-6 rounded-2xl font-retro text-xl text-cyan-400 hover:bg-cyan-400 hover:text-black transition-all";
            btn.innerText = year;
            btn.onclick = () => alert("Loading " + year + " Trivia...");
            grid.appendChild(btn);
        });
    </script>
</body>
</html>
